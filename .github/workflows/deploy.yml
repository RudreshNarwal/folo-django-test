name: Deploy to EC2

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Build Docker images
        run: docker-compose -f production.yml build
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo mkdir -p /app  # Create /app folder if it doesn't exist
            sudo chown -R $USER:$USER /app  # Set ownership
            sudo rsync -a --delete ./ /app/  # Copy project files to /app
            cd /app
            docker compose -f production.yml up --build -d --remove-orphans