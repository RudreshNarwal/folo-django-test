jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENV_BASE64_DJANGO: ${{ secrets.ENV_BASE64_DJANGO }}
    steps:
      - uses: actions/checkout@v3

      - name: Decode and create .env files
        run: |
          mkdir -p ./.envs/.production/
          echo "${{ env.ENV_BASE64_DJANGO }}" | base64 --decode > combined.env.django
          cp combined.env.django ./.envs/.production/.django

      - name: Create Docker Network
        run: docker network create reverseproxy_nw || true

      - name: Build Docker images
        run: docker compose -f production.yml up --build -d --remove-orphans

      - name: Debugging - List files in current directory
        run: ls -lah

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e  # Exit on first error

            echo "** Connected to EC2 server **"

            pwd
            ls -lah

            # Create app directory (if needed)
            sudo mkdir -p /app || true

            # Set ownership with minimal privileges (adjust as needed)
            sudo chown -R $USER:$USER /app

            echo "** Copying project files... **"
            sudo rsync -avh --delete ./ /app/  || (echo "** rsync failed!**" && exit 1)

            ls -l /app
            ls -l /app/production.yml

            cd /app

            echo "** Building and starting Docker containers... **"
            docker compose -f production.yml up --build -d --remove-orphans || (echo "** Docker Compose failed!**" && exit 1)

            echo "** Deployment completed successfully! **"
