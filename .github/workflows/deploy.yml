name: Deploy to EC2

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENV_BASE64_DJANGO: ${{ secrets.ENV_BASE64_DJANGO }}
    steps:
      - uses: actions/checkout@v3

      - name: Decode and create .env files
        run: |
          mkdir -p ./.envs/.production/
          echo "${{ env.ENV_BASE64_DJANGO }}" | base64 --decode > combined.env.django
          cp combined.env.django ./.envs/.production/.django

      - name: Create Docker Network
        run: docker network create reverseproxy_nw || true

      - name: Build Docker images
        run: docker compose -f production.yml up --build -d --remove-orphans

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo mkdir -p /app  # Create /app folder if it doesn't exist
            sudo chown -R $USER:$USER /app  # Set ownership
            sudo rsync -a --delete ./ /app/  # Copy project files to /app
            ls -l /app
            ls -l /app/production.yml  # Directly check for production.yml
            cd /app
            docker compose -f production.yml up --build -d --remove-orphans