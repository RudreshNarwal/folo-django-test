version: "3.9"

services:
    api:
        build:
            context: .
            dockerfile: ./docker/local/django/Dockerfile
        command: /start
        volumes:
            - .:/app:z
            - static_volume:/app/staticfiles
            - media_volume:/app/mediafiles
        expose:  #expose: Documents the ports that the container uses, making them accessible to other containers within the same Docker network.
            - "8000"
#        ports:    #ports: Maps container ports to the host machine, making the service accessible externally.
#            - "8009:8009"
        env_file:
            - ./.envs/.local/.django
        depends_on:
            - mailhog
        networks:
            - folo-api

    mailhog:
        image: mailhog/mailhog:v1.0.0
        container_name: mailhog
        ports:
            - "8025:8025"
        networks:
            - folo-api

    redis:
        image: redis:7-alpine
        container_name: redis-folo
        networks:
            - folo-api

    celery_worker:
        build:
            context: .
            dockerfile: ./docker/local/django/Dockerfile
        command: /start-celeryworker
        container_name: celery_worker
        volumes:
            - .:/app
        env_file:
            - ./.envs/.local/.django
        depends_on:
            - redis
            - mailhog
        networks:
            - folo-api

    celery_beat:
        build:
            context: .
            dockerfile: ./docker/local/django/Dockerfile
        command: /start-celerybeat
        container_name: celery_beat
        volumes:
            - .:/app
            - celery_beat_data:/data
        env_file:
            - ./.envs/.local/.django
        depends_on:
            - redis
            - mailhog
        networks:
            - folo-api

    flower: # Flower is an open-source web application for monitoring and managing Celery clusters.
        build:
            context: .
            dockerfile: ./docker/local/django/Dockerfile
        command: /start-flower
        volumes:
            - flower_data:/data
        env_file:
            - ./.envs/.local/.django
        ports:
            - "5555:5555"
        depends_on:
            - redis
        networks:
            - folo-api

    nginx:
        restart: always
        depends_on:
            - api
        volumes:
            - static_volume:/app/staticfiles
            - media_volume:/app/mediafiles
        build:
            context: ./docker/local/nginx
            dockerfile: Dockerfile
        ports:
            - "8080:80"
        networks:
            - folo-api

networks:
    folo-api:
        driver: bridge

volumes:
    static_volume:
    media_volume:
    flower_data:
    celery_beat_data: