version: '3'

services:
  app:
    image: "jc21/nginx-proxy-manager:latest"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt

networks:
    reverseproxy_nw:
        external: true

#external: true indicates that the network is defined outside of this Docker Compose file, and Docker Compose will not attempt to create it. If the network does not exist, Docker Compose will throw an error when attempting to launch the services.